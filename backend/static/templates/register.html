<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Skin Lesion Classifier</title>
  <link rel="stylesheet" href="/static/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card register-card">
      <header class="auth-header">
        <h1><i class="fas fa-microscope"></i> Skin Lesion Classifier</h1>
        <p>Create a new account</p>
      </header>
      
      <form id="register-form" method="post" class="auth-form">
        <div class="form-row">
          <div class="form-group">
            <label for="first_name">
              <i class="fas fa-user"></i> First Name
            </label>
            <input 
              type="text" 
              id="first_name" 
              name="first_name" 
              placeholder="First name"
            >
          </div>
          
          <div class="form-group">
            <label for="last_name">
              <i class="fas fa-user"></i> Last Name
            </label>
            <input 
              type="text" 
              id="last_name" 
              name="last_name" 
              placeholder="Last name"
            >
          </div>
        </div>
        
        <div class="form-group">
          <label for="email">
            <i class="fas fa-envelope"></i> Email
          </label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            placeholder="Enter your email"
            required
          >
        </div>
        
        <div class="form-group">
          <label for="username">
            <i class="fas fa-user-circle"></i> Username
          </label>
          <input 
            type="text" 
            id="username" 
            name="username" 
            placeholder="Choose a username"
            required
          >
        </div>
        
        <div class="form-group">
          <label for="password">
            <i class="fas fa-lock"></i> Password
          </label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            placeholder="At least 6 characters"
            required
          >
          <small>Password must be at least 6 characters long</small>
        </div>
        
        <div class="form-group">
          <label for="confirm_password">
            <i class="fas fa-lock"></i> Confirm Password
          </label>
          <input 
            type="password" 
            id="confirm_password" 
            name="confirm_password" 
            placeholder="Confirm your password"
            required
          >
        </div>
        
        <div id="error-message" class="error-message" style="display: none;"></div>
        
        <button type="submit" class="btn auth-btn">
          <i class="fas fa-user-plus"></i> Create Account
        </button>
      </form>
      
      <div class="auth-footer">
        <p>Already have an account? <a href="/login">Login here</a></p>
      </div>
    </div>
  </div>
  
  <script>
    document.getElementById('register-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const firstName = document.getElementById('first_name').value;
      const lastName = document.getElementById('last_name').value;
      const email = document.getElementById('email').value;
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirm_password').value;
      const errorMessage = document.getElementById('error-message');
      
      // Client-side validation
      if (!email || !username || !password) {
        errorMessage.textContent = 'Username, email, and password are required.';
        errorMessage.style.display = 'block';
        return;
      }
      
      if (password.length < 6) {
        errorMessage.textContent = 'Password must be at least 6 characters long.';
        errorMessage.style.display = 'block';
        return;
      }
      
      if (password !== confirmPassword) {
        errorMessage.textContent = 'Passwords do not match.';
        errorMessage.style.display = 'block';
        return;
      }
      
      try {
        const response = await fetch('/register', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            first_name: firstName,
            last_name: lastName,
            email: email,
            username: username,
            password: password,
            confirm_password: confirmPassword
          })
        });
        
        const data = await response.json();
        
        if (response.ok) {
          // Redirect to login page
          window.location.href = '/login?success=true';
        } else {
          errorMessage.textContent = data.error || 'Registration failed. Please try again.';
          errorMessage.style.display = 'block';
        }
      } catch (error) {
        console.error('Error:', error);
        errorMessage.textContent = 'An error occurred. Please try again.';
        errorMessage.style.display = 'block';
      }
    });
  </script>
</body>
</html>
